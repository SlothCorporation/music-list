name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# 各アーティストのディレクトリを個別にビルドし、site/<名前>/ に配置して1回でデプロイする。
# 人を増やすときは APPS にディレクトリ名を足すだけ（root には index を置かない＝404）。
env:
  APPS: 'serenagi'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build each app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          mkdir -p site
          for app in $APPS; do
            echo "::group::build $app"
            (cd "$app" && npm ci && npm run build)
            cp -r "$app/dist" "site/$app"
            echo "::endgroup::"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
